<html lang="en">
<head>

        /* Modern Design System Tokens */
        :root {
            --canvas: #090d16;
            --surface-primary: #ffffff;
            --surface-secondary: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --brand-primary: #0046be; /* Matches the logo's premium tech blue */
            --brand-accent: #002266;  /* Deep corporate navy */
            --brand-accent-hover: #001133;
            --emerald: #10b981;
            --ui-border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--surface-secondary);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* Responsive Glass Navigation Bar */
        header {
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--ui-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .logo-img {
            height: 50px;
            width: auto;
            object-fit: contain;
            display: block;
        }

        .nav-links {
            display: flex;
            gap: 32px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 15px;
            transition: color 0.25s ease;
        }

        .nav-links a:hover {
            color: var(--brand-primary);
        }

        /* High-End Immersive Hero Display */
        .hero {
            background: linear-gradient(135deg, #070a12 0%, #111827 100%);
            color: #ffffff;
            padding: 160px 20px 140px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -20%; left: 50%;
            transform: translateX(-50%);
            width: 800px; height: 600px;
            background: radial-gradient(circle, rgba(0, 70, 190, 0.2) 0%, transparent 60%);
            pointer-events: none;
            z-index: 1;
        }

        .hero-container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .hero h1 {
            font-size: 52px;
            line-height: 1.15;
            margin-bottom: 24px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 20px;
            color: #94a3b8;
            margin-bottom: 44px;
            font-weight: 400;
            max-width: 750px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-primary {
            background-color: var(--brand-primary);
            color: #ffffff;
            padding: 16px 38px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            border-radius: 8px;
            box-shadow: 0 4px 14px rgba(0, 70, 190, 0.35);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
        }

        .btn-primary:hover {
            background-color: var(--brand-accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(0, 70, 190, 0.45);
        }

        /* Generic Layout Wrappers */
        .section-wrapper {
            max-width: 1200px;
            margin: 100px auto;
            padding: 0 20px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-header h2 {
            font-size: 36px;
            color: var(--text-dark);
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .section-header p {
            color: var(--text-muted);
            font-size: 17px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Corporate Overview & Grid Metrics Layout */
        .about-layout {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
            align-items: center;
        }

        .about-text p {
            color: #334155;
            font-size: 17px;
            margin-bottom: 24px;
            line-height: 1.7;
        }

        .metrics-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .metric-card {
            background: var(--surface-primary);
            border: 1px solid var(--ui-border);
            padding: 24px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.01);
        }

        .metric-card h3 {
            font-size: 28px;
            color: var(--brand-primary);
            font-weight: 800;
            margin-bottom: 4px;
        }

        .metric-card p {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 500;
        }
